<div class="dash-top-row">
    <div id="mission-card" class="dash-top-mission"></div>
    <div id="countdown-card" class="dash-top-countdown"></div>
    <div id="streak-card" class="dash-top-streak"></div>
</div>
<div class="dash-second-row">
    <div id="progress-ring" class="dash-second-stats"></div>
    <div id="readiness-card" class="dash-second-readiness"></div>
    <div id="insight-card" class="dash-second-insight"></div>
</div>
<h3 style="color:var(--text-primary); margin:6px 0 10px; font-size:1rem;"><i class="fas fa-award"></i> Achievements</h3>
<div class="achieve-grid" id="achieveGrid"></div>
<h3 style="color:var(--text-primary); margin:12px 0 10px; font-size:1rem;"><i class="fas fa-chart-pie"></i> Subject Progress</h3>
<div class="subject-grid" id="subjectGrid"></div>
<div id="io-bar"></div>
<div class="course-plan-header">
    <h3 style="color:var(--text-primary); margin:12px 0 10px; font-size:1rem;"><i class="fas fa-list-ul"></i> Course Plan</h3>
    <div class="subject-selector-bar">
        <button class="subject-btn" data-subject="Quant">
            <i class="fas fa-calculator"></i> Quant
        </button>
        <button class="subject-btn" data-subject="Reasoning">
            <i class="fas fa-puzzle-piece"></i> Reasoning
        </button>
        <button class="subject-btn" data-subject="English">
            <i class="fas fa-book-open"></i> English
        </button>
        <button class="subject-btn" data-subject="General Studies">
            <i class="fas fa-globe"></i> GS
        </button>
        <button class="subject-btn subject-btn-custom" id="addCustomSubjectBtn">
            <i class="fas fa-plus"></i> Custom
        </button>
    </div>
    <div class="pinned-subjects" id="pinnedSubjects"></div>
</div>
<div class="course-accordion" id="courseAccordion"></div>
<div id="leaderboardContainer" class="premium-feature">
    <h3 style="color:var(--text-primary); margin:12px 0 10px; font-size:1rem;"><i class="fas fa-trophy"></i> Leaderboard</h3>
    <div id="leaderboardList" style="background:var(--bg-card); border-radius:14px; padding:12px; border:1px solid var(--border-color);">
        <p style="color:var(--text-muted); font-size:0.8rem;">Loading leaderboard...</p>
    </div>
</div>
