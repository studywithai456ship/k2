<div class="dash-card ring-card" style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
    <div class="ring-wrap" id="ringWrap">
        <svg viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="32"/>
            <circle class="ring-fg" id="ringFg" cx="40" cy="40" r="32" stroke-dasharray="0 201"/>
        </svg>
        <div class="ring-center"><span id="ringPct">0%</span><small>done</small></div>
    </div>
    <div class="stats-mini">
        <div class="sm-item"><div class="sm-num" id="smDone">0</div><div class="sm-lbl">Done</div></div>
        <div class="sm-item"><div class="sm-num" id="smTotal">0</div><div class="sm-lbl">Total</div></div>
        <div class="sm-item"><div class="sm-num" id="smPending">0</div><div class="sm-lbl">Pending</div></div>
        <div class="sm-item"><div class="sm-num" id="smVids">0</div><div class="sm-lbl">Videos</div></div>
        <div class="sm-item"><div class="sm-num" id="smFiles">0</div><div class="sm-lbl">Files</div></div>
        <div class="sm-item"><div class="sm-num" id="smDaysLeft">0</div><div class="sm-lbl">Days Left</div></div>
    </div>
</div>
