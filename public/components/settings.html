<div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px;">
    <div class="dash-card glass" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div class="fx-form-input" style="max-width:100%; flex:1;">
            <input type="text" id="examNameInput" placeholder=" " value="SBI PO" />
            <label for="examNameInput">Exam Name</label>
            <span></span>
        </div>
    </div>
    <div class="dash-card glass" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div style="flex:1; min-width:140px;">
            <label style="font-size:0.7rem; text-transform:uppercase; color:var(--text-muted); font-weight:600; display:block; margin-bottom:2px;">Exam Date</label>
            <input type="date" id="examDateInput" style="padding:8px 12px; border:1px solid var(--border-color); border-radius:12px; background:var(--input-bg); color:var(--text-primary); font-size:0.9rem; width:100%; outline:none;" />
        </div>
    </div>
</div>
